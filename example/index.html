<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>&middot; Witz &middot;</title>
    <link rel="icon" href="data:image/x-icon;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <figure>
      <canvas id="canvas" width="640" height="360"></canvas>
      <figcaption>
        <p><strong>witz.js</strong> Press space, make glitch</p>
      </figcaption>
    </figure>

    <noscript>please enable javascript</noscript>
    <script id="worker" type="javascript/worker">
      importScripts(location.origin + '/witz.js');

      self.addEventListener('message', function(e) {
        const filter = witz();

        self.postMessage({ result: filter(e.data.input) });
      });
    </script>
    <script src="index.js"></script>
  </body>
</html>
